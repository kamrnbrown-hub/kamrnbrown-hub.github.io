<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School — Kam'rn's Enigmas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0d0b10;
    --charcoal: #17141a;
    --panel: #1e1a22;
    --burgundy: #5c2a3a;
    --burgundy-bright: #8a3f54;
    --eggplant: #3d2a45;
    --dusty-blue: #5c7285;
    --gold: #b89b6c;
    --gold-bright: #d4b483;
    --lilac: #b9a4c9;
    --bone: #e8e2d8;
    --bone-dim: #a89e93;
    --line: rgba(184,155,108,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--void);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(92,42,58,0.35), transparent),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(61,42,69,0.3), transparent);
    color: var(--bone);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 60px;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 20px; }
  .back-link {
    display: inline-block;
    margin: 24px 0 0;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    opacity: 0.8;
  }
  header { text-align: center; padding: 20px 20px 28px; }
  h1.sigil {
    font-family: 'Cinzel', serif;
    font-size: clamp(26px, 7vw, 38px);
    font-weight: 600;
    letter-spacing: 2px;
    margin: 10px 0 6px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--burgundy-bright));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--lilac);
  }
  .divider {
    width: 120px; height: 1px; margin: 20px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    position: relative;
  }
  .divider::before {
    content: "✦"; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    background: var(--void); padding: 0 10px; color: var(--gold); font-size: 12px;
  }
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin: 44px 0 6px;
  }
  .section-label:first-of-type { margin-top: 0; }
  .section-sub {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--bone-dim);
    font-size: 14px;
    margin-bottom: 22px;
  }

  /* ---------- add forms ---------- */
  .add-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .add-row input, .add-row select {
    background: var(--charcoal);
    border: 1px solid var(--line);
    color: var(--bone);
    padding: 9px 10px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    border-radius: 2px;
    flex: 1;
    min-width: 100px;
  }
  .add-row button {
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold-bright);
    padding: 9px 16px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-row button:hover { background: rgba(184,155,108,0.1); }

  /* ---------- schedule ---------- */
  .schedule-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .day-col {
    border: 1px solid var(--line);
    background: var(--panel);
    min-height: 80px;
    padding: 6px 4px;
  }
  .day-head {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
  }
  .day-item {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    color: var(--bone);
    background: rgba(184,155,108,0.08);
    border-left: 2px solid var(--gold);
    padding: 3px 4px;
    margin-bottom: 4px;
    line-height: 1.25;
  }
  @media (max-width: 640px) {
    .schedule-grid { grid-template-columns: repeat(7, minmax(60px, 1fr)); overflow-x: auto; }
  }

  /* ---------- list cards ---------- */
  .list-card {
    border: 1px solid var(--line);
    background: linear-gradient(160deg, var(--panel), var(--charcoal));
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .list-card.done { opacity: 0.45; }
  .list-card.done .list-title { text-decoration: line-through; }
  .list-main { flex: 1; }
  .list-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--bone);
    font-weight: 600;
  }
  .list-meta {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 4px;
  }
  .list-actions {
    display: flex;
    gap: 8px;
  }
  .list-actions button {
    background: none;
    border: 1px solid var(--line);
    color: var(--bone-dim);
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .list-actions button:hover { border-color: var(--gold); color: var(--gold-bright); }
  .empty-state {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--bone-dim);
    padding: 20px;
    font-size: 14px;
  }

  /* priority badges */
  .badge-urgent { color: var(--burgundy-bright) !important; }
  .badge-soon { color: var(--gold-bright) !important; }
  .badge-later { color: var(--dusty-blue) !important; }

  footer {
    text-align: center;
    margin-top: 60px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--bone-dim);
    font-size: 13px;
  }
  footer .mark { color: var(--gold); font-size: 16px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="container">
  <a class="back-link" href="index.html">← back to grimoire</a>

  <header>
    <h1 class="sigil">School</h1>
    <div class="subtitle">the path toward FP&A, one credit at a time</div>
    <div class="divider"></div>
  </header>

  <div class="section-label">Weekly Class Schedule</div>
  <div class="section-sub">what's on the books this week</div>

  <div class="add-row">
    <select id="schedDay">
      <option>Mon</option><option>Tue</option><option>Wed</option><option>Thu</option><option>Fri</option><option>Sat</option><option>Sun</option>
    </select>
    <input type="text" id="schedText" placeholder="e.g. Accounting 101, 2-3:30pm">
    <button onclick="addSchedule()">+ Add</button>
  </div>

  <div class="schedule-grid" id="scheduleGrid"></div>

  <div class="section-label">Assignments & Deadlines</div>
  <div class="section-sub">what's due, and when</div>

  <div class="add-row">
    <input type="text" id="assignText" placeholder="Assignment name">
    <input type="date" id="assignDate">
    <select id="assignPriority">
      <option value="urgent">🔴 Urgent</option>
      <option value="soon">🟡 Soon</option>
      <option value="later">🟢 Later</option>
    </select>
    <button onclick="addAssignment()">+ Add</button>
  </div>

  <div id="assignmentList"></div>

  <div class="section-label">Study Goals</div>
  <div class="section-sub">skills to build toward FP&A consulting</div>

  <div class="add-row">
    <input type="text" id="goalText" placeholder="e.g. Finish Leila Gharani Excel course">
    <button onclick="addGoal()">+ Add</button>
  </div>

  <div id="goalList"></div>

  <footer>
    <span class="mark">✦</span>
    one third of the way, building the rest brick by brick
  </footer>
</div>

<script>
  const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // ---------- storage helpers ----------
  function load(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch(e) { return fallback; }
  }
  function save(key, val) {
    localStorage.setItem(key, JSON.stringify(val));
  }

  let schedule = load('kamrn_school_schedule', {}); // { Mon: [items], ... }
  let assignments = load('kamrn_school_assignments', []); // [{id,text,date,priority,done}]
  let goals = load('kamrn_school_goals', []); // [{id,text,done}]

  // ---------- schedule ----------
  function renderSchedule() {
    const grid = document.getElementById('scheduleGrid');
    grid.innerHTML = '';
    DAYS.forEach(day => {
      const col = document.createElement('div');
      col.className = 'day-col';
      const head = document.createElement('div');
      head.className = 'day-head';
      head.textContent = day;
      col.appendChild(head);
      (schedule[day] || []).forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'day-item';
        el.textContent = item;
        el.style.cursor = 'pointer';
        el.title = 'Click to remove';
        el.onclick = () => {
          schedule[day].splice(idx, 1);
          save('kamrn_school_schedule', schedule);
          renderSchedule();
        };
        col.appendChild(el);
      });
      grid.appendChild(col);
    });
  }

  function addSchedule() {
    const day = document.getElementById('schedDay').value;
    const text = document.getElementById('schedText').value.trim();
    if (!text) return;
    if (!schedule[day]) schedule[day] = [];
    schedule[day].push(text);
    save('kamrn_school_schedule', schedule);
    document.getElementById('schedText').value = '';
    renderSchedule();
  }

  // ---------- assignments ----------
  function renderAssignments() {
    const container = document.getElementById('assignmentList');
    container.innerHTML = '';
    if (assignments.length === 0) {
      container.innerHTML = '<div class="empty-state">no assignments tracked yet</div>';
      return;
    }
    const sorted = [...assignments].sort((a,b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return new Date(a.date || '2999-01-01') - new Date(b.date || '2999-01-01');
    });
    const badgeClass = { urgent: 'badge-urgent', soon: 'badge-soon', later: 'badge-later' };
    const badgeIcon = { urgent: '🔴', soon: '🟡', later: '🟢' };
    sorted.forEach(a => {
      const card = document.createElement('div');
      card.className = 'list-card' + (a.done ? ' done' : '');
      const dateStr = a.date ? new Date(a.date + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }) : 'no date';
      card.innerHTML = `
        <div class="list-main">
          <div class="list-title">${a.text}</div>
          <div class="list-meta ${badgeClass[a.priority]}">${badgeIcon[a.priority]} due ${dateStr}</div>
        </div>
        <div class="list-actions">
          <button data-action="done">✓</button>
          <button data-action="del">×</button>
        </div>
      `;
      card.querySelector('[data-action="done"]').onclick = () => {
        a.done = !a.done;
        save('kamrn_school_assignments', assignments);
        renderAssignments();
      };
      card.querySelector('[data-action="del"]').onclick = () => {
        assignments = assignments.filter(x => x.id !== a.id);
        save('kamrn_school_assignments', assignments);
        renderAssignments();
      };
      container.appendChild(card);
    });
  }

  function addAssignment() {
    const text = document.getElementById('assignText').value.trim();
    const date = document.getElementById('assignDate').value;
    const priority = document.getElementById('assignPriority').value;
    if (!text) return;
    assignments.push({ id: Date.now(), text, date, priority, done: false });
    save('kamrn_school_assignments', assignments);
    document.getElementById('assignText').value = '';
    document.getElementById('assignDate').value = '';
    renderAssignments();
  }

  // ---------- goals ----------
  function renderGoals() {
    const container = document.getElementById('goalList');
    container.innerHTML = '';
    if (goals.length === 0) {
      container.innerHTML = '<div class="empty-state">no study goals yet</div>';
      return;
    }
    goals.forEach(g => {
      const card = document.createElement('div');
      card.className = 'list-card' + (g.done ? ' done' : '');
      card.innerHTML = `
        <div class="list-main">
          <div class="list-title">${g.text}</div>
        </div>
        <div class="list-actions">
          <button data-action="done">✓</button>
          <button data-action="del">×</button>
        </div>
      `;
      card.querySelector('[data-action="done"]').onclick = () => {
        g.done = !g.done;
        save('kamrn_school_goals', goals);
        renderGoals();
      };
      card.querySelector('[data-action="del"]').onclick = () => {
        goals = goals.filter(x => x.id !== g.id);
        save('kamrn_school_goals', goals);
        renderGoals();
      };
      container.appendChild(card);
    });
  }

  function addGoal() {
    const text = document.getElementById('goalText').value.trim();
    if (!text) return;
    goals.push({ id: Date.now(), text, done: false });
    save('kamrn_school_goals', goals);
    document.getElementById('goalText').value = '';
    renderGoals();
  }

  renderSchedule();
  renderAssignments();
  renderGoals();
</script>

</body>
</html>
