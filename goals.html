<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goals — Kam'rn's Enigmas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0d0b10;
    --charcoal: #17141a;
    --panel: #1e1a22;
    --burgundy: #5c2a3a;
    --burgundy-bright: #8a3f54;
    --eggplant: #3d2a45;
    --dusty-blue: #5c7285;
    --gold: #b89b6c;
    --gold-bright: #d4b483;
    --lilac: #b9a4c9;
    --bone: #e8e2d8;
    --bone-dim: #a89e93;
    --line: rgba(184,155,108,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--void);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(92,42,58,0.35), transparent),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(61,42,69,0.3), transparent);
    color: var(--bone);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 60px;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 0 20px; }
  .back-link {
    display: inline-block; margin: 24px 0 0; font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--gold); text-decoration: none; opacity: 0.8;
  }
  header { text-align: center; padding: 20px 20px 28px; }
  h1.sigil {
    font-family: 'Cinzel', serif; font-size: clamp(26px, 7vw, 38px); font-weight: 600;
    letter-spacing: 2px; margin: 10px 0 6px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold) 60%, var(--burgundy-bright));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--lilac); }
  .divider {
    width: 120px; height: 1px; margin: 20px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent); position: relative;
  }
  .divider::before {
    content: "✦"; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    background: var(--void); padding: 0 10px; color: var(--gold); font-size: 12px;
  }

  /* phase nudge banner */
  .phase-nudge {
    border: 1px solid var(--lilac);
    background: rgba(185,164,201,0.08);
    padding: 14px 18px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--lilac);
    margin-bottom: 30px;
  }
  .phase-nudge b { color: var(--gold-bright); font-style: normal; }

  /* timeframe tabs */
  .tab-bar {
    display: flex; justify-content: center; gap: 4px; margin: 0 0 30px;
    flex-wrap: wrap; border-bottom: 1px solid var(--line);
  }
  .tab-btn {
    background: none; border: none; color: var(--bone-dim); font-family: 'Cinzel', serif;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 10px 16px; cursor: pointer; border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--gold-bright); border-bottom-color: var(--gold); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-sub {
    text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--bone-dim); font-size: 14px; margin-bottom: 22px;
  }

  /* category accordion */
  .category-block {
    border: 1px solid var(--line);
    background: linear-gradient(160deg, var(--panel), var(--charcoal));
    margin-bottom: 14px;
  }
  .category-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px;
    cursor: pointer;
  }
  .category-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-bright);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .category-count {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--bone-dim);
  }
  .category-chevron {
    color: var(--gold);
    font-size: 14px;
    transition: transform 0.25s ease;
  }
  .category-block.collapsed .category-chevron { transform: rotate(-90deg); }
  .category-body {
    padding: 0 18px 18px;
  }
  .category-block.collapsed .category-body { display: none; }

  .funnel-context {
    border: 1px dashed var(--line);
    background: rgba(185,164,201,0.05);
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  .funnel-label {
    font-family: 'Cinzel', serif; font-size: 8.5px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--lilac); margin-bottom: 6px;
  }
  .funnel-item {
    font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--bone-dim);
    padding: 2px 0;
  }

  /* goal items */
  .goal-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .goal-item {
    display: flex; align-items: flex-start; gap: 10px;
    border: 1px solid var(--line); background: var(--charcoal);
    padding: 10px 12px; cursor: pointer;
  }
  .goal-item.checked { border-color: var(--gold); background: rgba(184,155,108,0.06); }
  .goal-item.checked .goal-text { text-decoration: line-through; color: var(--bone-dim); }
  .goal-box {
    width: 16px; height: 16px; border: 1px solid var(--gold); flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--gold-bright);
  }
  .goal-text {
    font-family: 'Cormorant Garamond', serif; font-size: 14.5px; color: var(--bone); line-height: 1.4; flex: 1;
  }
  .goal-delete {
    background: none; border: none; color: var(--bone-dim);
    font-size: 14px; cursor: pointer; padding: 0 4px;
  }

  /* finance trackers */
  .finance-tracker {
    border: 1px solid var(--line); background: var(--charcoal);
    padding: 12px 14px; margin-bottom: 8px;
  }
  .finance-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .finance-name {
    font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--gold-bright); font-weight: 600;
  }
  .finance-numbers {
    font-family: 'Cinzel', serif; font-size: 11px; color: var(--bone-dim);
  }
  .finance-bar-track {
    height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden;
  }
  .finance-bar-fill {
    height: 100%; border-radius: 4px; transition: width 0.3s ease;
  }
  .finance-bar-fill.paydown { background: var(--win-green, #7a9b76); }
  .finance-bar-fill.saveup { background: var(--gold); }
  .finance-delete {
    background: none; border: none; color: var(--bone-dim); font-size: 13px; cursor: pointer;
  }

  /* add forms */
  .add-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
  }
  .add-row input, .add-row select {
    background: var(--panel); border: 1px solid var(--line); color: var(--bone);
    padding: 9px 10px; font-family: 'Jost', sans-serif; font-size: 13px; border-radius: 2px; flex: 1; min-width: 90px;
  }
  .add-row button {
    background: none; border: 1px solid var(--gold); color: var(--gold-bright);
    padding: 9px 16px; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; cursor: pointer; white-space: nowrap;
  }
  .add-row button:hover { background: rgba(184,155,108,0.1); }

  .finance-add-row { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .finance-add-row .add-row { flex-wrap: wrap; }
  .finance-add-row input[type="text"] { flex: 1 1 100%; margin-bottom: 6px; }
  .direction-toggle {
    display: flex; gap: 6px; margin-bottom: 6px; flex: 1 1 100%;
  }
  .direction-btn {
    flex: 1; background: var(--panel); border: 1px solid var(--line); color: var(--bone-dim);
    font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 7px; cursor: pointer;
  }
  .direction-btn.active { border-color: var(--gold); color: var(--gold-bright); }

  .empty-note {
    text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic;
    color: var(--bone-dim); font-size: 13px; padding: 10px 0;
  }

  footer {
    text-align: center; margin-top: 60px; font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: var(--bone-dim); font-size: 13px;
  }
  footer .mark { color: var(--gold); font-size: 16px; display: block; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="container">
  <a class="back-link" href="index.html">← back to grimoire</a>

  <header>
    <h1 class="sigil">Goals</h1>
    <div class="subtitle">what you're building, season by season</div>
    <div class="divider"></div>
  </header>

  <div class="phase-nudge" id="phaseNudge">—</div>

  <div class="tab-bar">
    <button class="tab-btn" data-tab="yearly">Yearly</button>
    <button class="tab-btn" data-tab="quarterly">Quarterly</button>
    <button class="tab-btn" data-tab="monthly">Monthly</button>
    <button class="tab-btn" data-tab="weekly">Weekly</button>
    <button class="tab-btn active" data-tab="daily">Daily</button>
  </div>

  <div class="tab-panel" id="tab-yearly">
    <div class="section-sub">the big picture</div>
    <div class="category-container" data-timeframe="yearly"></div>
  </div>

  <div class="tab-panel" id="tab-quarterly">
    <div class="section-sub">the season ahead</div>
    <div class="category-container" data-timeframe="quarterly"></div>
  </div>

  <div class="tab-panel" id="tab-monthly">
    <div class="section-sub">this month, in service of the season</div>
    <div class="category-container" data-timeframe="monthly"></div>
  </div>

  <div class="tab-panel" id="tab-weekly">
    <div class="section-sub">this week's focus</div>
    <div class="category-container" data-timeframe="weekly"></div>
  </div>

  <div class="tab-panel active" id="tab-daily">
    <div class="section-sub">what today is about</div>
    <div class="category-container" data-timeframe="daily"></div>
  </div>

  <footer>
    <span class="mark">✦</span>
    discipline is just love you give your future self
  </footer>
</div>

<script>
  const CATEGORIES = ['Spiritual', 'Adulting', 'Education', 'Health', 'Finances', 'Hobbies/Fun', 'Business', 'Life/Relationships'];
  const TIMEFRAMES = ['yearly', 'quarterly', 'monthly', 'weekly', 'daily'];
  const PARENT_TIMEFRAME = { quarterly: 'yearly', monthly: 'quarterly', weekly: 'monthly', daily: 'weekly' };
  const TIMEFRAME_LABELS = { yearly: 'Yearly', quarterly: 'Quarterly', monthly: 'Monthly', weekly: 'Weekly', daily: 'Daily' };

  // ---------- storage ----------
  function load(key, fallback) {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }
    catch(e) { return fallback; }
  }
  function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

  function goalsKey(timeframe, category) {
    return `kamrn_goals_${timeframe}_${category}`;
  }
  function financeKey(timeframe, category) {
    return `kamrn_finance_${timeframe}_${category}`;
  }
  function collapseKey(timeframe, category) {
    return `kamrn_goalscollapse_${timeframe}_${category}`;
  }

  // ---------- tabs ----------
  const tabBtns = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.tab-panel');
  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      panels.forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ---------- build category blocks for each timeframe ----------
  function buildCategoryBlocks() {
    TIMEFRAMES.forEach(timeframe => {
      const container = document.querySelector(`.category-container[data-timeframe="${timeframe}"]`);
      container.innerHTML = '';

      CATEGORIES.forEach(category => {
        const isFinance = category === 'Finances';
        const collapsed = load(collapseKey(timeframe, category), false);

        const block = document.createElement('div');
        block.className = 'category-block' + (collapsed ? ' collapsed' : '');

        const goals = load(goalsKey(timeframe, category), []);
        const finances = isFinance ? load(financeKey(timeframe, category), []) : [];
        const totalCount = goals.length + finances.length;
        const doneCount = goals.filter(g => g.done).length;

        // funnel context: show parent timeframe's goals for this category, if any
        let funnelHtml = '';
        const parentTimeframe = PARENT_TIMEFRAME[timeframe];
        if (parentTimeframe) {
          const parentGoals = load(goalsKey(parentTimeframe, category), []);
          if (parentGoals.length > 0) {
            const parentItems = parentGoals.map(g => `<div class="funnel-item">${g.done ? '✓' : '○'} ${g.text}</div>`).join('');
            funnelHtml = `
              <div class="funnel-context">
                <div class="funnel-label">In Service Of This ${TIMEFRAME_LABELS[parentTimeframe]} Goal</div>
                ${parentItems}
              </div>
            `;
          }
        }

        block.innerHTML = `
          <div class="category-header">
            <div class="category-title">${category}</div>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="category-count">${totalCount > 0 ? doneCount + '/' + goals.length + (isFinance ? ' · ' + finances.length + ' tracked' : '') : 'empty'}</div>
              <div class="category-chevron">▾</div>
            </div>
          </div>
          <div class="category-body">
            ${funnelHtml}
            ${isFinance ? `<div class="finance-list" data-timeframe="${timeframe}" data-category="${category}"></div>` : ''}
            <div class="goal-list" data-timeframe="${timeframe}" data-category="${category}"></div>
            <div class="add-row">
              <input type="text" placeholder="add a goal..." data-goal-input data-timeframe="${timeframe}" data-category="${category}">
              <button data-goal-add data-timeframe="${timeframe}" data-category="${category}">+ Add</button>
            </div>
            ${isFinance ? `
            <div class="finance-add-row">
              <div class="add-row">
                <div class="direction-toggle" data-timeframe="${timeframe}" data-category="${category}">
                  <button class="direction-btn active" data-dir="paydown">Pay Down</button>
                  <button class="direction-btn" data-dir="saveup">Save Up</button>
                </div>
                <input type="text" placeholder="name (e.g. Zable, Roth)" data-finance-name data-timeframe="${timeframe}" data-category="${category}">
                <input type="number" placeholder="current $" data-finance-current data-timeframe="${timeframe}" data-category="${category}">
                <input type="number" placeholder="target $" data-finance-target data-timeframe="${timeframe}" data-category="${category}">
                <button data-finance-add data-timeframe="${timeframe}" data-category="${category}">+ Track</button>
              </div>
            </div>` : ''}
          </div>
        `;

        block.querySelector('.category-header').addEventListener('click', (e) => {
          block.classList.toggle('collapsed');
          save(collapseKey(timeframe, category), block.classList.contains('collapsed'));
        });

        container.appendChild(block);
      });
    });

    // wire up all the render + add logic after DOM exists
    TIMEFRAMES.forEach(timeframe => {
      CATEGORIES.forEach(category => {
        renderGoals(timeframe, category);
        if (category === 'Finances') renderFinances(timeframe, category);
      });
    });

    attachAddHandlers();
  }

  function renderGoals(timeframe, category) {
    const listEl = document.querySelector(`.goal-list[data-timeframe="${timeframe}"][data-category="${category}"]`);
    if (!listEl) return;
    const goals = load(goalsKey(timeframe, category), []);
    listEl.innerHTML = '';

    if (goals.length === 0) {
      listEl.innerHTML = '<div class="empty-note">nothing here yet</div>';
    }

    goals.forEach(g => {
      const item = document.createElement('div');
      item.className = 'goal-item' + (g.done ? ' checked' : '');
      item.innerHTML = `
        <div class="goal-box">${g.done ? '✓' : ''}</div>
        <div class="goal-text">${g.text}</div>
        <button class="goal-delete">×</button>
      `;
      item.querySelector('.goal-box').parentElement.addEventListener('click', (e) => {
        if (e.target.classList.contains('goal-delete')) return;
        g.done = !g.done;
        save(goalsKey(timeframe, category), goals);
        renderGoals(timeframe, category);
        updateCategoryCount(timeframe, category);
        refreshFunnelContext(timeframe, category);
      });
      item.querySelector('.goal-delete').addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = goals.indexOf(g);
        goals.splice(idx, 1);
        save(goalsKey(timeframe, category), goals);
        renderGoals(timeframe, category);
        updateCategoryCount(timeframe, category);
        refreshFunnelContext(timeframe, category);
      });
      listEl.appendChild(item);
    });
  }

  function renderFinances(timeframe, category) {
    const listEl = document.querySelector(`.finance-list[data-timeframe="${timeframe}"][data-category="${category}"]`);
    if (!listEl) return;
    const finances = load(financeKey(timeframe, category), []);
    listEl.innerHTML = '';

    finances.forEach((f, idx) => {
      let pct;
      if (f.direction === 'paydown') {
        // paying down: progress = how much has been reduced from an assumed starting point
        // we treat "target" as the goal (usually lower/0), "current" as where they are now
        // progress is inverse: closer to target = more progress. We need an original baseline.
        const original = f.original !== undefined ? f.original : f.current;
        const range = original - f.target;
        const progressed = original - f.current;
        pct = range !== 0 ? Math.max(0, Math.min(100, (progressed / range) * 100)) : 100;
      } else {
        pct = f.target !== 0 ? Math.max(0, Math.min(100, (f.current / f.target) * 100)) : 0;
      }

      const div = document.createElement('div');
      div.className = 'finance-tracker';
      div.innerHTML = `
        <div class="finance-row">
          <div class="finance-name">${f.name} <span style="font-size:10px; color:var(--bone-dim); font-family:'Cinzel',serif; text-transform:uppercase; letter-spacing:0.5px;">${f.direction === 'paydown' ? '(pay down)' : '(save up)'}</span></div>
          <div style="display:flex; align-items:center; gap:8px;">
            <div class="finance-numbers">$${f.current} ${f.direction === 'paydown' ? '→' : '/'} $${f.target}</div>
            <button class="finance-delete" data-idx="${idx}">×</button>
          </div>
        </div>
        <div class="finance-bar-track">
          <div class="finance-bar-fill ${f.direction}" style="width:${pct}%"></div>
        </div>
      `;
      div.querySelector('.finance-delete').addEventListener('click', () => {
        finances.splice(idx, 1);
        save(financeKey(timeframe, category), finances);
        renderFinances(timeframe, category);
        updateCategoryCount(timeframe, category);
      });
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('finance-delete')) return;
        const newVal = prompt(`Update current amount for ${f.name}:`, f.current);
        if (newVal !== null && !isNaN(parseFloat(newVal))) {
          f.current = parseFloat(newVal);
          save(financeKey(timeframe, category), finances);
          renderFinances(timeframe, category);
        }
      });
      listEl.appendChild(div);
    });
  }

  function updateCategoryCount(timeframe, category) {
    const goals = load(goalsKey(timeframe, category), []);
    const finances = category === 'Finances' ? load(financeKey(timeframe, category), []) : [];
    const doneCount = goals.filter(g => g.done).length;
    const totalCount = goals.length + finances.length;
    const countEl = document.querySelector(`.category-block .category-header .category-count`);
    // find the right block by searching all blocks for matching data
    document.querySelectorAll('.category-block').forEach(block => {
      const title = block.querySelector('.category-title').textContent;
      const goalList = block.querySelector(`.goal-list[data-timeframe="${timeframe}"][data-category="${category}"]`);
      if (goalList && title === category) {
        block.querySelector('.category-count').textContent =
          totalCount > 0 ? doneCount + '/' + goals.length + (category === 'Finances' ? ' · ' + finances.length + ' tracked' : '') : 'empty';
      }
    });
  }

  function refreshFunnelContext(parentTimeframe, category) {
    // find any child timeframe whose parent is this timeframe, and refresh its funnel box
    Object.entries(PARENT_TIMEFRAME).forEach(([childTf, parentTf]) => {
      if (parentTf !== parentTimeframe) return;
      const childBlock = document.querySelector(`.category-container[data-timeframe="${childTf}"] .goal-list[data-category="${category}"]`);
      if (!childBlock) return;
      const categoryBody = childBlock.closest('.category-body');
      if (!categoryBody) return;

      let funnelBox = categoryBody.querySelector('.funnel-context');
      const parentGoals = load(goalsKey(parentTimeframe, category), []);

      if (parentGoals.length === 0) {
        if (funnelBox) funnelBox.remove();
        return;
      }

      const parentItems = parentGoals.map(g => `<div class="funnel-item">${g.done ? '✓' : '○'} ${g.text}</div>`).join('');
      const newHtml = `
        <div class="funnel-label">In Service Of This ${TIMEFRAME_LABELS[parentTimeframe]} Goal</div>
        ${parentItems}
      `;

      if (!funnelBox) {
        funnelBox = document.createElement('div');
        funnelBox.className = 'funnel-context';
        categoryBody.insertBefore(funnelBox, categoryBody.firstChild);
      }
      funnelBox.innerHTML = newHtml;
    });
  }

  function attachAddHandlers() {
    document.querySelectorAll('[data-goal-add]').forEach(btn => {
      btn.addEventListener('click', () => {
        const timeframe = btn.dataset.timeframe;
        const category = btn.dataset.category;
        const input = document.querySelector(`[data-goal-input][data-timeframe="${timeframe}"][data-category="${category}"]`);
        const text = input.value.trim();
        if (!text) return;
        const goals = load(goalsKey(timeframe, category), []);
        goals.push({ text, done: false });
        save(goalsKey(timeframe, category), goals);
        input.value = '';
        renderGoals(timeframe, category);
        updateCategoryCount(timeframe, category);
        refreshFunnelContext(timeframe, category);
      });
    });

    document.querySelectorAll('.direction-toggle').forEach(toggle => {
      toggle.querySelectorAll('.direction-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          toggle.querySelectorAll('.direction-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    });

    document.querySelectorAll('[data-finance-add]').forEach(btn => {
      btn.addEventListener('click', () => {
        const timeframe = btn.dataset.timeframe;
        const category = btn.dataset.category;
        const nameInput = document.querySelector(`[data-finance-name][data-timeframe="${timeframe}"][data-category="${category}"]`);
        const currentInput = document.querySelector(`[data-finance-current][data-timeframe="${timeframe}"][data-category="${category}"]`);
        const targetInput = document.querySelector(`[data-finance-target][data-timeframe="${timeframe}"][data-category="${category}"]`);
        const toggle = document.querySelector(`.direction-toggle[data-timeframe="${timeframe}"][data-category="${category}"]`);
        const direction = toggle.querySelector('.direction-btn.active').dataset.dir;

        const name = nameInput.value.trim();
        const current = parseFloat(currentInput.value);
        const target = parseFloat(targetInput.value);

        if (!name || isNaN(current) || isNaN(target)) {
          alert('Please fill in name, current amount, and target amount.');
          return;
        }

        const finances = load(financeKey(timeframe, category), []);
        finances.push({ name, current, target, direction, original: current });
        save(financeKey(timeframe, category), finances);

        nameInput.value = '';
        currentInput.value = '';
        targetInput.value = '';

        renderFinances(timeframe, category);
        updateCategoryCount(timeframe, category);
      });
    });
  }

  buildCategoryBlocks();

  // ---------- phase-aware nudge ----------
  function renderPhaseNudge() {
    const nudgeEl = document.getElementById('phaseNudge');
    const startRaw = localStorage.getItem('kamrn_cycle_start');

    if (!startRaw) {
      nudgeEl.textContent = "Set your cycle start date on the Hormone Balance page to unlock phase-aware goal suggestions.";
      return;
    }

    const CYCLE_LENGTH = 30;
    const startDate = new Date(startRaw + 'T00:00:00');
    const today = new Date(new Date().toDateString());
    const diffDays = Math.floor((today - startDate) / 86400000);
    const day = ((diffDays % CYCLE_LENGTH) + CYCLE_LENGTH) % CYCLE_LENGTH + 1;

    let phaseKey, phaseName, nudge;
    if (day >= 14 && day <= 16) {
      phaseKey = 'ovulation'; phaseName = 'Ovulation';
      nudge = "peak confidence — great day to pitch a big goal out loud or commit to something publicly.";
    } else if (day >= 1 && day <= 5) {
      phaseKey = 'period'; phaseName = 'Period';
      nudge = "low-energy phase — review goals gently rather than starting anything new. Rest counts as progress.";
    } else if (day >= 6 && day <= 13) {
      phaseKey = 'follicular'; phaseName = 'Follicular';
      nudge = "rising energy — this is your best window all month to set new goals and plan ambitious quarters.";
    } else {
      phaseKey = 'luteal'; phaseName = 'Luteal';
      nudge = "turning inward — perfect for finishing existing goals and tying up loose ends, not starting new ones.";
    }

    nudgeEl.innerHTML = `You're in <b>${phaseName}</b> — ${nudge}`;
  }

  renderPhaseNudge();
</script>
